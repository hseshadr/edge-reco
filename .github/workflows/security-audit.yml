# Dependency vulnerability audit — deliberately its OWN workflow, not a CI step.
#
# Policy: NO suppressions — `poe audit` runs `pip-audit` with no `--ignore-vuln`
# flags. Every finding is fixed by a version floor in backend/pyproject.toml, not
# silenced. (CVE-2025-3000 in torch — the one advisory we ever ignored — is now
# fixed by the `torch>=2.12.1` floor; the suppression has been dropped.)
# If pip-audit finds ANYTHING, this workflow is RED until upstream ships a fix —
# visibly, on every push and on a weekly schedule (new CVEs appear against unchanged
# code, which is exactly how CVE-2025-3000/torch arrived). Keeping it out of the main
# CI gate means a known-unfixable advisory can't mask real code regressions there.
#
# The substrate libs are pulled from public GitHub via the git sources in
# backend/pyproject.toml (same as ci.yml) — no private-repo token needed.
name: Security audit
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # weekly, Monday 09:00 UTC — advisories move without commits
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.2.0
        # Pin the concrete tag: the maintainers do not publish a floating `v8`
        # major alias (only v8.x.y exist), so `@v8` fails to resolve.
        with:
          enable-cache: true
      - name: Pin Python
        run: uv python install 3.13
      - name: Sync
        run: uv sync --group dev
      - name: Dependency audit (pip-audit; no suppressions — every finding fixed by a floor)
        run: uv run poe audit
