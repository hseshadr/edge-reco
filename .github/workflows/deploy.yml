# Deploy https://edge-reco.com — Cloudflare Pages (static, backend-free PWA).
#
# AUTO-DEPLOY: runs automatically after the "CI" workflow passes on `main`
# (and on manual workflow_dispatch). It stays INERT until these repository
# secrets exist — when they are absent BOTH the auto-run and a manual run
# SKIP cleanly (green no-op, no red X). Secrets required:
#
#   CLOUDFLARE_API_TOKEN    Pages:Edit-scoped API token
#   CLOUDFLARE_ACCOUNT_ID   the Cloudflare account that owns the `edge-reco`
#                           Pages project + the edge-reco.com zone
#
# Production deploys run via local wrangler (docs/DEPLOY.md), so until the
# secrets are added this workflow is EXPECTED to no-op — never to fail. It
# cannot half-deploy: the deploy job only runs when the preflight secrets
# check passes, with a fail-loud guard step kept as defense in depth.
# SPA-ONLY: a static `build:pages` artifact (signed catalog copied same-origin
# into dist/bundle) — no R2, no bundle signing key in CI. See docs/DEPLOY.md.
#
# One-time prerequisites (outside this workflow, done by a human with wrangler):
#   npx wrangler pages project create edge-reco --production-branch=main
#   + attach the edge-reco.com custom domain (docs/DEPLOY.md)
name: Deploy edge-reco.com

on:
  # Auto-deploy the commit that just passed CI on main.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never let two deploys interleave their uploads.
concurrency:
  group: deploy-edge-reco-com
  cancel-in-progress: false

jobs:
  # Gate every deploy. Trigger gate: the CI run that fired this must have
  # succeeded on main (a manual dispatch passes through). Secrets gate: when
  # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID are absent, configured=false
  # makes BOTH the auto-run and a manual dispatch SKIP cleanly (green no-op)
  # instead of red-X'ing the run.
  preflight:
    name: Gate deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Detect whether deploy secrets are configured
        id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy secrets not configured — skipping deploy (clean no-op). See .github/workflows/deploy.yml header."
          fi

  deploy:
    name: Build + deploy to Cloudflare Pages
    needs: preflight
    # Runs ONLY when the secrets are configured — auto-run and manual dispatch
    # alike skip cleanly otherwise (mirroring the auto path's preflight; a
    # manual dispatch used to punch through and red-X at the guard step).
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Guard — refuse to run until the deploy secrets are configured
        # Unreachable while preflight gates this job — kept as defense in depth
        # should the `if` condition ever drift.
        # Runs BEFORE checkout — run from the always-present workspace root.
        working-directory: ${{ github.workspace }}
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          for v in CF_TOKEN CF_ACCOUNT; do
            if [ -z "${!v}" ]; then
              echo "::error::secret behind $v is not configured (see the header of .github/workflows/deploy.yml)"
              missing=1
            fi
          done
          exit "$missing"

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Deploy the exact commit that passed CI (auto-run); HEAD for manual.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      # Reads the pinned pnpm version from frontend/package.json "packageManager".
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.node-version # 22 — the Cloudflare Pages target
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install workspace
        run: pnpm -C frontend install --frozen-lockfile

      # Self-hosted SPA model weights (house standard §8.1b), fetched BEFORE the
      # build — same fixed-key cache as CI. The build's `prebuild` hook verifies
      # them (sha256-pinned, fail-loud), and the built dist/ ships them under
      # /models/ so the live site never touches a model CDN at runtime. Every
      # file is under the Cloudflare Pages 25 MiB single-asset limit (the q8
      # ONNX is ~22.97 MB; pinned by scripts/download-model.test.mjs).
      - name: Cache self-hosted model weights
        uses: actions/cache@v6
        with:
          path: frontend/app/public/models
          key: model-weights-${{ runner.os }}-${{ hashFiles('frontend/app/scripts/download-model.mjs') }}
      - name: Fetch self-hosted model weights (idempotent, sha256-verified)
        working-directory: frontend/app
        run: node scripts/download-model.mjs

      # The canonical Pages build: vite build with VITE_BASE=/ +
      # VITE_BUNDLE_BASE_URL=bundle, then the committed signed catalog copied
      # same-origin into dist/bundle (zero CORS, zero application backend).
      # Output: frontend/app/dist.
      - name: Build the static SPA (signed bundle copied same-origin)
        run: pnpm -C frontend -F frontend run build:pages

      - name: Deploy to Cloudflare Pages
        # wrangler reads the API token + account id from the environment.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4.103.0 pages deploy frontend/app/dist --project-name=edge-reco --branch=main
