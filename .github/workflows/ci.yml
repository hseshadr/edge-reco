name: CI
on:
  push:
    branches: [main]
  pull_request:

# One coherent gate. `quality` is the Python core; `frontend` + `e2e` are the
# Nimbus storefront pnpm workspace (app + the extracted @edgeproc/browser package).
# Folding the frontend gate in here (it used to live in a separate frontend.yml)
# means the CI badge — and the deploy workflow's `workflow_run` trigger — gate on
# backend AND frontend AND the in-browser model-load e2e, not just the Python core.
#
# All run: steps use static commands only — no untrusted ${{ github.event.* }}
# input is interpolated anywhere, so there is no workflow-injection surface.

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      # The substrate libs (edge-proc, shared-libs-python) are pulled from public
      # GitHub via the git sources pinned in backend/pyproject.toml — exactly what
      # an external cloner gets. No private-repo token, no path patching: CI builds
      # the project the same way `git clone … && uv sync` does for anyone.
      - uses: astral-sh/setup-uv@v8.2.0
        # Pin the concrete tag: the maintainers do not publish a floating `v8`
        # major alias (only v8.x.y exist), so `@v8` fails to resolve.
        with:
          enable-cache: true
      - name: Pin Python
        run: uv python install 3.13
      # Not --frozen: the substrate git sources are pinned to immutable release
      # tags, so a fresh resolve is deterministic without a committed cross-repo lock.
      - name: Sync
        run: uv sync --group dev
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src
      - name: Complexity (xenon)
        run: uv run xenon --max-absolute B --max-modules B --max-average A src
      - name: Tests with coverage
        run: uv run pytest --cov=edgereco --cov-report=term-missing --cov-fail-under=90
      # Dependency audit moved to its own workflow (security-audit.yml): it stays
      # red while an upstream CVE has no fix — with no suppressions (every finding is
      # fixed by a version floor in backend/pyproject.toml; CVE-2025-3000 in torch is
      # now fixed by torch>=2.12.1) — without masking code regressions here.

  # The Nimbus storefront + the extracted @edgeproc/browser package live in a pnpm
  # workspace rooted at frontend/. This job mirrors the verified-green local hard
  # gate exactly: biome -> tsc -> vitest -> production build, across both workspace
  # members. We use pnpm (not npm) because the install must resolve cleanly across
  # OSes: npm pins os/cpu-specific optional binaries (e.g.
  # @rolldown/binding-darwin-arm64) as required and fails on the Linux runner with
  # EBADPLATFORM, whereas pnpm records them as optional os/cpu deps.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      # Reads the pinned pnpm version from frontend/package.json "packageManager".
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24" # >= 22.12 required by Vite 8
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Lint (biome) — package + app
        run: pnpm -r run lint

      - name: Typecheck (tsc) — package + app
        run: pnpm -r run typecheck

      # Runs the full unit suite WITH v8 coverage so the per-workspace thresholds
      # (90% lines/statements/functions on the engine core logic; a measured floor
      # on the app) are enforced in CI, not just configured. Subsumes `pnpm -r test`.
      - name: Unit tests + coverage thresholds (vitest) — package + app
        run: pnpm -r run test:coverage

      - name: Demo preflight regression (node:test) — edge bundle-match check
        run: pnpm -F frontend run test:preflight

      - name: Build app (proves the workspace link resolves)
        run: pnpm -F frontend run build

  # Playwright e2e: the storefront suite, the C1 sync + in-browser embed model-load
  # smoke suite, and the offline-PWA proof (production build + real service worker +
  # real in-browser model), each starting its own Vite + static-catalog webServer on
  # its own ports. The C1 suite loads the real ~25MB Xenova/all-MiniLM-L6-v2 weights
  # from the HuggingFace CDN; HF_HOME and TRANSFORMERS_CACHE are pinned to a cached
  # dir so the weights download once and are restored on subsequent runs.
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      TRANSFORMERS_CACHE: ${{ github.workspace }}/.cache/huggingface
    steps:
      - uses: actions/checkout@v5

      # Reads the pinned pnpm version from frontend/package.json "packageManager".
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24" # >= 22.12 required by Vite 8
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright Chromium + system deps
        working-directory: frontend/app
        run: pnpm exec playwright install --with-deps chromium

      - name: Cache HuggingFace model weights
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/huggingface
          # Keyed on the model id so the ~25MB MiniLM weights survive across runs
          # and are only re-downloaded if the pinned model changes.
          key: hf-model-${{ runner.os }}-Xenova-all-MiniLM-L6-v2

      - name: E2E — storefront suite (default config)
        working-directory: frontend/app
        run: pnpm exec playwright test

      - name: E2E — C1 sync + embed model-load smoke suite
        working-directory: frontend/app
        run: pnpm exec playwright test -c playwright.c1.config.ts

      # The flagship offline proof: production build + the REAL generated service
      # worker (precache + runtime caches) + the REAL in-browser ~25MB MiniLM model
      # (same CDN download the C1 smoke suite already exercises in CI). The script
      # runs its own `vite build` first; Playwright then previews the build on :5175
      # and serves the signed bundle on :8921 (distinct from the suites above).
      - name: E2E — offline-PWA proof (production build + real SW/model)
        working-directory: frontend/app
        run: pnpm run test:e2e:offline

      - name: Upload Playwright report + traces on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/app/playwright-report
            frontend/app/test-results
          if-no-files-found: ignore
          retention-days: 7
