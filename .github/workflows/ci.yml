name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "9"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        run: cd services/api && uv sync --group dev
      - name: Ruff
        run: cd services/api && uv run ruff check app tests
      - name: Mypy (domain + wire)
        run: cd services/api && uv run mypy app/domain app/wire app/main.py
      - name: Pytest
        run: cd services/api && uv run pytest -v

  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "9"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: pnpm install --frozen-lockfile
      - run: cd services/api && uv sync --group dev
      - name: Regenerate TS client
        run: pnpm -C packages/contracts run generate:ts
      - name: Regenerate Python stubs
        run: pnpm -C packages/contracts run generate:py
      - name: Assert no drift
        run: git diff --exit-code packages/sdk/src/generated services/api/app/generated

  e2e:
    runs-on: ubuntu-latest
    needs: [typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "9"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: pnpm install --frozen-lockfile
      - run: cd services/api && uv sync --group dev
      - name: Install Playwright browsers
        run: pnpm -C apps/demo-web-e2e run install-browsers
      - name: Run E2E
        run: pnpm -C apps/demo-web-e2e run test
