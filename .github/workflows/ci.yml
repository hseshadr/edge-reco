name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Checkout private sibling repos so ../edgeproc and ../shared-libs-python
      # resolve identically to the local dev layout (~/dev/oss/ siblings).
      # Requires a PAT with read access to both private repos stored as
      # secrets.PORTFOLIO_PAT (Settings -> Secrets -> Actions in this repo).
      # Scopes needed: repo (read) for hseshadr/edgeproc + hseshadr/shared-libs-python.
      - name: Checkout edgeproc (private sibling)
        uses: actions/checkout@v4
        with:
          repository: hseshadr/edgeproc
          token: ${{ secrets.PORTFOLIO_PAT }}
          path: ../edgeproc

      - name: Checkout shared-libs-python (private sibling)
        uses: actions/checkout@v4
        with:
          repository: hseshadr/shared-libs-python
          token: ${{ secrets.PORTFOLIO_PAT }}
          path: ../shared-libs-python

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Pin Python
        run: uv python install 3.13
      - name: Sync
        run: uv sync --group dev --frozen
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src
      - name: Tests with coverage
        run: uv run pytest --cov=edgereco --cov-report=term-missing --cov-fail-under=90
