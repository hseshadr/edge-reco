name: CI
on:
  push:
    branches: [main]
  pull_request:

# One coherent gate. `quality` is the Python core; `frontend` + `e2e` are the
# Nimbus storefront pnpm workspace (app + the extracted @edgeproc/browser package).
# Folding the frontend gate in here (it used to live in a separate frontend.yml)
# means the CI badge — and the deploy workflow's `workflow_run` trigger — gate on
# backend AND frontend AND the in-browser model-load e2e, not just the Python core.
#
# All run: steps use static commands only — no untrusted ${{ github.event.* }}
# input is interpolated anywhere, so there is no workflow-injection surface.

# Least privilege for the whole workflow: every job only reads the checkout and
# runs the gate — none write repo contents, releases, or PR comments. Jobs may
# still narrow further (the gitleaks job restates contents: read explicitly).
permissions:
  contents: read

jobs:
  # Secret-leak scan over the FULL history (fetch-depth: 0), not just the diff —
  # a credential committed five commits ago is exactly as leaked as one committed
  # now. No repo .gitleaks.toml: nothing to allowlist, the default ruleset applies.
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      # The substrate libs (edge-proc, shared-libs-python) are pulled from public
      # GitHub via the git sources pinned in backend/pyproject.toml — exactly what
      # an external cloner gets. No private-repo token, no path patching: CI builds
      # the project the same way `git clone … && uv sync` does for anyone.
      - uses: astral-sh/setup-uv@v8.3.2
        # Pin the concrete tag: the maintainers do not publish a floating `v8`
        # major alias (only v8.x.y exist), so `@v8` fails to resolve.
        with:
          enable-cache: true
      - name: Pin Python
        run: uv python install 3.13
      # Not --frozen: the substrate git sources are pinned to immutable release
      # tags, so a fresh resolve is deterministic without a committed cross-repo lock.
      - name: Sync
        run: uv sync --group dev
      # CI runs the gate command ITSELF (house standard §3/§4): `poe gate` is
      # fmt-check -> lint -> typecheck -> complexity -> test-with-coverage, defined
      # once in backend/pyproject.toml. One definition, zero CI/local drift.
      - name: Gate (poe gate — the exact local command)
        run: uv run poe gate
      # Dependency audit moved to its own workflow (security-audit.yml): it stays
      # red while an upstream CVE has no fix — with no suppressions (every finding is
      # fixed by a version floor in backend/pyproject.toml; CVE-2025-3000 in torch is
      # now fixed by torch>=2.12.1) — without masking code regressions here.

  # The Nimbus storefront + the extracted @edgeproc/browser package live in a pnpm
  # workspace rooted at frontend/. This job mirrors the verified-green local hard
  # gate exactly: biome -> tsc -> vitest -> production build, across both workspace
  # members. We use pnpm (not npm) because the install must resolve cleanly across
  # OSes: npm pins os/cpu-specific optional binaries (e.g.
  # @rolldown/binding-darwin-arm64) as required and fails on the Linux runner with
  # EBADPLATFORM, whereas pnpm records them as optional os/cpu deps.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      # Reads the pinned pnpm version from frontend/package.json "packageManager".
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24" # >= 22.12 required by Vite 8
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # Self-hosted SPA model weights (house standard §8.1b), fetched BEFORE the
      # gate: the app's `prebuild` hook (gate:quality ends in a build) resolves
      # them from app/public/models/ instead of huggingface.co at runtime.
      # Fixed-key cache so only the first run pays the download (§4 flake
      # engineering); the script is sha256-pinned and idempotent, so on a cache
      # hit it just verifies digests.
      - name: Cache self-hosted model weights
        uses: actions/cache@v6
        with:
          path: frontend/app/public/models
          key: model-weights-${{ runner.os }}-${{ hashFiles('frontend/app/scripts/download-model.mjs') }}
      - name: Fetch self-hosted model weights (idempotent, sha256-verified)
        working-directory: frontend/app
        run: node scripts/download-model.mjs

      # CI runs the gate command ITSELF (house standard §3/§4): `gate:quality` is
      # biome -> tsc -> vitest-with-coverage -> preflight -> build -> production
      # artifact checks across both workspace members, defined once in
      # frontend/package.json. The full local
      # gate is `pnpm gate` = gate:quality + gate:e2e; the e2e half runs in the
      # `e2e` job below (it needs Playwright browsers + the model cache).
      - name: Gate — quality half (pnpm gate:quality — the exact local command)
        run: pnpm run gate:quality

      # i18n completeness gate (ported from AlmaMesh's scripts/verify-i18n.mjs):
      # a REAL headless-Chromium drive of the production bundle gate:quality just
      # built (app/dist), proving the offline bundled catalogs + mounted
      # I18nextProvider render translated screens — not raw keys — with
      # <html lang>=en and a clean console. The parity + component unit specs run
      # inside gate:quality above; THIS proves the strings actually reach the page.
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Install Playwright Chromium + system deps
        working-directory: frontend/app
        run: pnpm exec playwright install --with-deps chromium
      - name: i18n live-drive (verify-i18n against the built preview)
        working-directory: frontend/app
        run: |
          set -euo pipefail
          # Serve the already-built dist and poll until it accepts connections,
          # then drive the i18n gate against it. The preview is torn down by the
          # trap on step exit.
          pnpm exec vite preview --port 4173 --strictPort &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null "http://localhost:4173"; then
              echo "preview server is up (attempt $i)"
              break
            fi
            if ! kill -0 "$preview_pid" 2>/dev/null; then
              echo "preview server exited prematurely" >&2
              exit 1
            fi
            sleep 1
          done
          curl -fsS -o /dev/null "http://localhost:4173" || {
            echo "preview server never became ready" >&2
            exit 1
          }
          node scripts/verify-i18n.mjs http://localhost:4173

  # Playwright e2e: the storefront suite, the C1 sync + in-browser embed model-load
  # smoke suite (HF hosts BLOCKED — weights served same-origin from /models/), the
  # offline-PWA proof, and the cold-CDN-blocked proof (production build + real
  # service worker + real in-browser model, HF AND jsDelivr blocked), each starting
  # its own Vite + static-catalog webServer on its own ports. The weights are
  # SELF-HOSTED (house standard §8.1b): fetched once at build time by
  # scripts/download-model.mjs under a fixed cache key, never from a CDN at runtime.
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      # Reads the pinned pnpm version from frontend/package.json "packageManager".
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24" # >= 22.12 required by Vite 8
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright Chromium + system deps
        working-directory: frontend/app
        run: pnpm exec playwright install --with-deps chromium

      # Same self-hosted weights as the frontend job (fixed key, §4 flake
      # engineering): the c1 + offline/cold suites serve them from /models/.
      - name: Cache self-hosted model weights
        uses: actions/cache@v6
        with:
          path: frontend/app/public/models
          key: model-weights-${{ runner.os }}-${{ hashFiles('frontend/app/scripts/download-model.mjs') }}
      - name: Fetch self-hosted model weights (idempotent, sha256-verified)
        working-directory: frontend/app
        run: node scripts/download-model.mjs

      # CI runs the gate command ITSELF (house standard §3/§4): `gate:e2e` is the
      # storefront suite -> the C1 sync + in-browser embed model-load smoke suite ->
      # the offline-PWA proof (production build + REAL generated service worker +
      # REAL in-browser MiniLM model), defined once in frontend/package.json —
      # the exact e2e half of the local `pnpm gate`.
      - name: Gate — e2e half (pnpm gate:e2e — the exact local command)
        run: pnpm run gate:e2e

      - name: Upload Playwright report + traces on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            frontend/app/playwright-report
            frontend/app/test-results
          if-no-files-found: ignore
          retention-days: 7
