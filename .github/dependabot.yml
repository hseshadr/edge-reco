# Keep dependencies current across every ecosystem this repo ships.
#   - pip            : the Python core + demo server (backend/, uv-managed)
#   - npm            : the pnpm storefront workspace (frontend/, pnpm-lock.yaml)
#   - github-actions : the workflows under .github/workflows/
# All weekly. Dependabot's "npm" ecosystem natively understands pnpm-lock.yaml.
# Each ecosystem is GROUPED into a single consolidated PR per run, so updates
# arrive as one reviewable PR instead of a flood of one-per-dependency PRs.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      backend-pip:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-npm:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
