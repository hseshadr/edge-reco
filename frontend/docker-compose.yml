# Nimbus demo — docker-compose. BACKEND-FREE showcase.
#
# ┌─ READ THIS FIRST ──────────────────────────────────────────────────────┐
# │ The whole stack runs with NO application backend. The browser does the  │
# │ search:                                                                  │
# │                                                                          │
# │     origin (static signed bundle) ──► edge (Caddy CDN :8081)            │
# │                                              │                           │
# │                                              │ sync (signed, verified,   │
# │                                              ▼  IN THE BROWSER)          │
# │     frontend (static Nimbus SPA :5174) ── syncs the bundle into OPFS,    │
# │                                           loads the embedding model, and │
# │                                           runs edge-reco's hybrid search │
# │                                           + session re-ranking IN-TAB.   │
# │                                                                          │
# │ No FastAPI, no Python server in the request path. The SPA verifies the   │
# │ bundle ed25519+sha256 against a public key PINNED in its own build       │
# │ (public/public.key) — it never trusts the bundle origin for the key.     │
# │                                                                          │
# │ Run from this directory (frontend/): docker compose up --build           │
# │ Then open:                          http://localhost:5174                │
# │                                                                          │
# │ This compose file needs ONLY this repo — no sibling repos, no engine     │
# │ build. (`make dev` is still the lightest way to iterate on the SPA.)     │
# └─────────────────────────────────────────────────────────────────────────┘

# Pin the compose project name so this demo's volumes/network are namespaced
# `nimbus-demo_*` instead of the directory-derived default `frontend` — which any
# sibling repo with its own `frontend/` compose dir would also claim, sharing
# (and contaminating) the same caddy_data volume + network. Container names are
# already nimbus-*; this closes the volume/network half of the same collision.
name: nimbus-demo

services:
  # Static-file origin: serves a signed bundle (flat `latest`, `manifest/<hash>`,
  # `chunk/<hash>`). Defaults to the committed seed (../backend/examples/catalog/);
  # the flywheel-retrain path overrides NIMBUS_ORIGIN_DIR to a writable runtime
  # copy (.demo-origin) so `edgereco retrain` can republish without touching the
  # committed seed. Mount is :ro for the CONTAINER (it only serves); the host-side
  # retrain job writes the runtime dir directly, which :ro does not restrict.
  origin:
    image: python:3.13-slim
    container_name: nimbus-origin
    working_dir: /catalog
    volumes:
      - ${NIMBUS_ORIGIN_DIR:-../backend/examples/catalog}:/catalog:ro
    command: ["python", "-m", "http.server", "8080"]
    healthcheck:
      # `/latest` is the bundle's version pointer (the old flat `/manifest.json`
      # is gone in the content-addressed layout).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/latest')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Edge CDN: Caddy reverse proxy with the bundle's cache policy (immutable
  # chunk/manifest, short-TTL `latest`) + permissive CORS. This is what the
  # browser syncs from. Host-mapped on :8081 so the browser can reach it.
  edge:
    image: caddy:2-alpine
    container_name: nimbus-edge
    depends_on:
      origin:
        condition: service_healthy
    # Host port defaults to 8081 for standalone `docker compose up`; the demo
    # orchestrator (app/scripts/demo.mjs) overrides EDGE_HOST_PORT with a random
    # free port per run to avoid cross-project collisions.
    ports:
      - "${EDGE_HOST_PORT:-8081}:8081"
    volumes:
      - ../backend/deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/latest"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Mimicked cloud: the FastAPI `/events` collector (demo_server) — the uplink
  # SINK for the flywheel. NOT part of the backend-free default demo; brought up
  # only by `poe demo-flywheel` (and via the `flywheel` compose profile). It
  # SYNCS the same signed bundle from the edge (prebuilt FAISS, zero recompute)
  # and serves CORS so the browser can POST batched interaction events to it.
  collector:
    profiles: ["flywheel"]
    build:
      # Backend-only context: release-tagged dependencies come from uv.lock, and
      # host secrets/sibling repositories never enter Docker's build context.
      context: ../backend
      dockerfile: demo_server/Dockerfile
    container_name: nimbus-collector
    depends_on:
      edge:
        condition: service_healthy
    environment:
      DEMO_HOST: 0.0.0.0
      DEMO_PORT: "8000"
      # CORS allowlist for the browser SPA. Defaults to the standalone SPA port;
      # the demo orchestrator overrides it with the SPA's random port per run.
      DEMO_CORS_ORIGINS: ${DEMO_CORS_ORIGINS:-http://localhost:5174}
      # Sync the SAME signed bundle the browser uses (prebuilt vector/, no rebuild).
      EDGERECO_BUNDLE_BASE_URL: http://edge:8081
      EDGERECO_VERIFY_KEY_PATH: /app/examples/keys/public.key
    ports:
      - "${COLLECTOR_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 40s

  # The Nimbus SPA: a static bundle. VITE_BUNDLE_BASE_URL is baked at build time
  # to the host-mapped edge origin, because the BROWSER (not this container) is
  # what syncs the signed bundle from it. VITE_EVENTS_URL is the optional uplink
  # sink — empty by default (backend-free); set it to enable the flywheel.
  frontend:
    build:
      # Context is the npm-workspace root (frontend/) so the build sees the root
      # lockfile + the @edgeproc/browser package the SPA depends on.
      context: .
      dockerfile: app/Dockerfile
      args:
        VITE_BUNDLE_BASE_URL: http://localhost:8081
        VITE_EVENTS_URL: ${VITE_EVENTS_URL:-}
    container_name: nimbus-frontend
    ports:
      - "5174:5174"
    depends_on:
      edge:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
