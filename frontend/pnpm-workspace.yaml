packages:
  - app
  - packages/*

# Supply-chain cooldown: refuse any package version published less than 1440
# minutes (24h) ago — the window in which a compromised release is usually
# caught and unpublished.
#
# Declaring this key explicitly is NOT a no-op. pnpm v11 already applies a
# 1440-minute default, but evaluates it in NON-STRICT mode: a resolution-path
# install that trips the cooldown exits 0 and SILENTLY appends the tripped
# package to a `minimumReleaseAgeExclude:` list in this very file, permanently
# disabling the check for that package on every future install, CI included.
# Nothing prints loudly and nothing fails, so the edit rides along in the next
# `git commit -a`. That auto-injection has already landed in commits twice in
# this portfolio.
#
# Setting the key explicitly auto-enables strict mode, which inverts the
# outcome: the install hard-fails with ERR_PNPM_NO_MATURE_MATCHING_VERSION and
# writes nothing. Verified on pnpm 11.5.0 — unset: exit 0 + exemption injected;
# set: exit 1 + file untouched.
#
# A fresh dependency failing here is the control WORKING. Wait the window out.
# Never add an exemption to go green — a committed exemption is a gate failure,
# enforced by app/scripts/supply-chain-contract.test.mjs.
minimumReleaseAge: 1440

# Security dependency overrides. pnpm v10+ reads `overrides` from here, not from
# the package.json `pnpm` field (which v11 ignores). undici >=7.28.0 clears 6
# Dependabot alerts (test-only, via jsdom); protobufjs >=7.6.5 clears 1 alert
# (RUNTIME, pulled by the transformers.js embedder via onnxruntime-web).
#
# Both are pinned to their current major (<8) — a minimal security bump, not a
# major upgrade:
#   undici: jsdom@29.1.1 hard-requires undici's internal
#     `lib/handler/wrap-handler.js`, which undici 8.x removed — an open `>=7.28.0`
#     resolves to 8.x and breaks the jsdom test env. 7.28.0 (latest 7.x) clears all 6.
#   protobufjs: floor raised 7.6.3 -> 7.6.5 for GHSA-j3f2-48v5-ccww (DoS via
#     infinite loop in .proto option parsing; vulnerable >=7.5.0 <=7.6.4, patched
#     >=7.6.5). The old `>=7.6.3` floor still admitted the vulnerable 7.6.4, which
#     is what the lockfile had resolved. Keep the `<8` bound: onnxruntime-web
#     declares `protobufjs: ^7.2.4`, so an open `>=7.6.5` overshoots to 8.x — a
#     needless runtime major bump that also breaks the engine's declared range,
#     and 8.x carries its own live advisories (GHSA-jfj6-75fj-8934, and j3f2
#     again through <=8.6.5). 7.6.5 is the patched 7.x line (npm `latest-7`).
#   sharp: pin transitive sharp to the patched 0.35.x line. `app/package.json`
#     already declares a direct `sharp: ^0.35.3` devDependency, but that does NOT
#     force the NESTED copy pnpm resolves under `@huggingface/transformers`
#     (declared `sharp: ^0.34.5`, capped below 0.35) — pnpm audit still flagged
#     that path (app>@huggingface/transformers>sharp) with 4 HIGH libvips CVEs
#     (2026-33327/33328/35590/35591, vulnerable <0.35.0). An explicit override is
#     the only way to force that nested resolution onto the patched line too.
#   fast-uri: floor raised to >=3.1.4 for GHSA-v2hh-gcrm-f6hx (host confusion via
#     literal backslash authority delimiter; vulnerable >=3.0.0 <=3.1.3, patched
#     >=3.1.4 in the same 3.x line). Pulled in transitively via vite-plugin-pwa>
#     workbox-build>@apideck/better-ajv-errors>ajv>fast-uri; no direct dependency
#     exists to bump instead. Bounded `<4` — a minimal security bump within the
#     patched 3.x line, not an unrelated major upgrade.
overrides:
  adm-zip: "0.6.0"
  undici: ">=7.28.0 <8"
  protobufjs: ">=7.6.5 <8"
  sharp: "^0.35.0"
  fast-uri: ">=3.1.4 <4"

# pnpm v11 does not run a dependency's build/postinstall scripts unless it is
# explicitly allowlisted here (replaces v10's onlyBuiltDependencies). These are
# transitive native deps of @huggingface/transformers, needed by the node-side
# embedding parity tests: onnxruntime-node is the native ONNX backend, protobufjs
# compiles its proto bindings, sharp builds its native image binary.
allowBuilds:
  onnxruntime-node: true
  protobufjs: true
  sharp: true
