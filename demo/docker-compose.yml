# Nimbus demo — docker-compose. BACKEND-FREE showcase.
#
# ┌─ READ THIS FIRST ──────────────────────────────────────────────────────┐
# │ The whole stack runs with NO application backend. The browser does the  │
# │ search:                                                                  │
# │                                                                          │
# │     origin (static signed bundle) ──► edge (Caddy CDN :8081)            │
# │                                              │                           │
# │                                              │ sync (signed, verified,   │
# │                                              ▼  IN THE BROWSER)          │
# │     frontend (static Nimbus SPA :5173) ── syncs the bundle into OPFS,    │
# │                                           loads the embedding model, and │
# │                                           runs edge-reco's hybrid search │
# │                                           + session re-ranking IN-TAB.   │
# │                                                                          │
# │ No FastAPI, no Python server in the request path. The SPA verifies the   │
# │ bundle ed25519+sha256 against a public key PINNED in its own build       │
# │ (public/public.key) — it never trusts the bundle origin for the key.     │
# │                                                                          │
# │ Run from this directory (demo/):  docker compose up --build              │
# │ Then open:                        http://localhost:5173                  │
# │                                                                          │
# │ This compose file needs ONLY this repo — no sibling repos, no engine     │
# │ build. (`make dev` is still the lightest way to iterate on the SPA.)     │
# └─────────────────────────────────────────────────────────────────────────┘

services:
  # Static-file origin: serves the committed signed bundle (examples/catalog/:
  # flat `latest`, `manifest/<hash>`, `chunk/<hash>`). Read-only mount.
  origin:
    image: python:3.13-slim
    container_name: nimbus-origin
    working_dir: /catalog
    volumes:
      - ../examples/catalog:/catalog:ro
    command: ["python", "-m", "http.server", "8080"]
    healthcheck:
      # `/latest` is the bundle's version pointer (the old flat `/manifest.json`
      # is gone in the content-addressed layout).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/latest')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Edge CDN: Caddy reverse proxy with the bundle's cache policy (immutable
  # chunk/manifest, short-TTL `latest`) + permissive CORS. This is what the
  # browser syncs from. Host-mapped on :8081 so the browser can reach it.
  edge:
    image: caddy:2-alpine
    container_name: nimbus-edge
    depends_on:
      origin:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ../deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/latest"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # The Nimbus SPA: a static bundle. VITE_BUNDLE_BASE_URL is baked at build time
  # to the host-mapped edge origin, because the BROWSER (not this container) is
  # what syncs the signed bundle from it.
  frontend:
    build:
      # Context is the npm-workspace root (demo/) so the build sees the root
      # lockfile + the @edgeproc/browser package the SPA depends on.
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_BUNDLE_BASE_URL: http://localhost:8081
    container_name: nimbus-frontend
    ports:
      - "5173:5173"
    depends_on:
      edge:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
