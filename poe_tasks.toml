# Repo-root task file so `poe demo` works straight from edge-reco/ (no `cd backend`).
# The canonical task also lives in backend/pyproject.toml ([tool.poe.tasks.demo]) for
# `cd backend && uv run poe demo`; keep the two in sync. The demo is backend-free
# (Docker edge + Vite SPA), so it needs no Python project behind it.
[tasks.demo]
help = "Turnkey backend-free demo — edge (:8081) + Vite SPA (:5174), opens your browser."
cwd = "frontend"            # resolved relative to this file's dir (the repo root)
shell = """
set -e
docker info >/dev/null 2>&1 || { echo 'Docker is not running — start Docker Desktop first.'; exit 1; }
[ -d node_modules ] || pnpm install
echo '>> edge -> http://localhost:8081  (signed bundle the SPA syncs)'
echo '>> app  -> http://localhost:5174  <- opening this in your browser'
# --wait blocks until both healthchecks pass, so the SPA never races an
# origin that isn't ready yet (a not-ready edge surfaces as a confusing error).
docker compose up -d --wait origin edge
# stop (not down) the edge on Ctrl-C — keeps the caddy_data/_config volumes for fast restarts
trap 'docker compose stop origin edge >/dev/null 2>&1' EXIT INT TERM
# Preflight: prove :8081 serves THIS repo's committed bundle before opening the
# SPA. If another project occupies :8081, fail here with a clear message instead
# of the browser's cryptic "signature verification failed".
node app/scripts/check-edge.mjs
cd app && pnpm exec vite --open
"""

# Same demo, PLUS the flywheel uplink: interaction events are captured in-tab and
# periodically flushed to a mimicked-cloud collector (the FastAPI /events on
# :8000). Inference stays 100% local — the uplink is an optional, off-path
# beacon. This brings up an extra backend container, so it's a separate task and
# NOT the backend-free headline `demo`.
[tasks.demo-flywheel]
help = "Demo + flywheel uplink — events flush to a mimicked cloud collector (:8000)."
cwd = "frontend"
shell = """
set -e
docker info >/dev/null 2>&1 || { echo 'Docker is not running — start Docker Desktop first.'; exit 1; }
[ -d node_modules ] || pnpm install
echo '>> edge      -> http://localhost:8081  (signed bundle the SPA syncs)'
echo '>> collector -> http://localhost:8000  (mimicked cloud — receives interaction events)'
echo '>> app       -> http://localhost:5174  <- opening this in your browser'
# Seed a WRITABLE runtime origin from the committed seed so `poe demo-retrain` can
# republish the recomputed bundle without mutating the committed examples/catalog/.
rm -rf .demo-origin && mkdir -p .demo-origin && cp -R ../backend/examples/catalog/. .demo-origin/
export NIMBUS_ORIGIN_DIR=./.demo-origin
# First run builds the collector image (the engine + siblings) — that is the
# opt-in cost of the flywheel; the plain `demo` stays image-free.
docker compose up -d --wait origin edge collector
trap 'docker compose stop origin edge collector >/dev/null 2>&1' EXIT INT TERM
node app/scripts/check-edge.mjs
cd app && VITE_EVENTS_URL=http://localhost:8000/events pnpm exec vite --open
"""

# The CLOUD half of the flywheel: after clicking around under `demo-flywheel`, run
# this to recompute popularity from the collected events and republish a freshly
# signed bundle into the runtime origin. The edge revalidates `latest` within 30s,
# so a browser refresh re-ranks the rail toward what you clicked. Kept in sync with
# backend/pyproject.toml's [tool.poe.tasks.demo-retrain].
[tasks.demo-retrain]
help = "Flywheel retrain — recompute popularity from collected events, republish the signed bundle."
cwd = "backend"
shell = """
set -e
ORIGIN=../frontend/.demo-origin
[ -d "$ORIGIN/manifest" ] || { echo 'No runtime origin yet — run `poe demo-flywheel` first, click around, then retrain.'; exit 1; }
[ -f examples/keys/private.key ] || { echo 'Missing examples/keys/private.key (gitignored). Retrain re-signs the bundle, so the maintainer signing key is required.'; exit 1; }
echo '>> retrain -> syncing the current bundle, folding in collected engagement, republishing…'
uv run edgereco retrain "$ORIGIN" "$ORIGIN" examples/keys/private.key examples/keys/public.key --events-url http://localhost:8000/events/export --alpha 0.5 --cache-dir .retrain-cache
echo '>> done. Refresh http://localhost:5174 — the rail re-ranks toward what you clicked.'
"""
